<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Office Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --green: #00f5a0;
      --orange: #ff6b35;
      --muted: #4a4a6a;
      --text: #e8e8f0;
      --subtext: #7a7a9a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 32px 20px 24px;
      overflow: hidden;
    }

    /* Ambient glow background */
    body::before {
      content: '';
      position: fixed;
      top: -40%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,245,160,0.06) 0%, transparent 70%);
      pointer-events: none;
      transition: background 0.6s ease;
      z-index: 0;
    }
    body.clocked-in::before {
      background: radial-gradient(circle, rgba(255,107,53,0.07) 0%, transparent 70%);
    }

    .header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .app-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .sync-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .sync-dot.syncing {
      background: var(--green);
      animation: pulse 1s infinite;
    }

    .sync-dot.error {
      background: var(--orange);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Clock display */
    .clock-section {
      text-align: left;
      position: relative;
      z-index: 1;
    }

    .live-time {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(38px, 12vw, 58px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }

    .live-date {
      margin-top: 8px;
      font-size: 12px;
      color: var(--subtext);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Main button */
    .btn-wrap {
      position: relative;
      z-index: 1;
    }

    .main-btn {
      width: 168px;
      height: 168px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      position: relative;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .btn-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--green);
      transition: border-color 0.4s ease, transform 0.15s ease;
    }

    .btn-ring::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid rgba(0,245,160,0.2);
      transition: border-color 0.4s ease;
    }

    .clocked-in .btn-ring {
      border-color: var(--orange);
    }
    .clocked-in .btn-ring::before {
      border-color: rgba(255,107,53,0.2);
    }

    .btn-inner {
      position: absolute;
      inset: 16px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.3s, transform 0.15s;
    }

    .main-btn:active .btn-inner {
      transform: scale(0.94);
    }

    .btn-label {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 19px;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: var(--green);
      transition: color 0.4s;
    }

    .clocked-in .btn-label {
      color: var(--orange);
    }

    .btn-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Ripple on tap */
    .ripple {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      border: 2px solid var(--green);
      opacity: 0;
      transform: scale(1);
    }
    .clocked-in .ripple { border-color: var(--orange); }
    .ripple.animate {
      animation: rippleOut 0.5s ease-out forwards;
    }
    @keyframes rippleOut {
      from { transform: scale(1); opacity: 0.6; }
      to   { transform: scale(1.4); opacity: 0; }
    }

    /* Bottom section */
    .bottom-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      position: relative;
      z-index: 1;
    }

    .history-trigger {
      align-self: flex-end;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .history-trigger:active { opacity: 0.6; transform: scale(0.94); }
    .history-trigger:hover { border-color: var(--green); }
    .hamburger-line {
      display: block;
      width: 18px;
      height: 2px;
      background: var(--subtext);
      border-radius: 2px;
      transition: background 0.2s;
    }
    .history-trigger:hover .hamburger-line { background: var(--green); }

    .stats-grid {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 10px;
      text-align: left;
    }

    .estimate-card {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
    }

    .stat-label {
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--subtext);
      margin-bottom: 4px;
    }

    .stat-value {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-value.green { color: var(--green); }
    .stat-value.orange { color: var(--orange); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 13px;
      color: var(--subtext);
      transition: transform 0.3s ease;
      z-index: 99;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    .estimate-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .estimate-label {
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--subtext);
    }
    .estimate-edit-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .estimate-edit-btn:active { opacity: 0.6; transform: scale(0.9); }
    .estimate-edit-btn:hover { border-color: var(--green); color: var(--green); }
    .estimate-numbers {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .estimate-actual { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 17px; font-weight: 700; color: var(--green); }
    .estimate-sep { color: var(--muted); font-size: 12px; margin: 0 5px; }
    .estimate-target { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 17px; font-weight: 700; color: var(--text); }
    .estimate-diff { font-size: 10px; letter-spacing: 0.05em; }
    .estimate-diff.ahead { color: var(--green); }
    .estimate-diff.behind { color: var(--orange); }
    .progress-track {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--green);
      transition: width 0.6s ease;
    }
    .progress-fill.behind { background: var(--orange); }

    /* Calendar drawer */
    .cal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 50;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .cal-overlay.open { opacity: 1; pointer-events: all; }
    .cal-drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      z-index: 51;
      padding: 0 0 40px;
      max-height: 88dvh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    }
    .cal-drawer.open { transform: translateY(0); }
    .cal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 12px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .cal-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }
    .cal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px; }
    .cal-legend {
      display: flex; gap: 12px; padding: 10px 20px;
      flex-shrink: 0; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--subtext); letter-spacing: 0.1em; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .legend-dot.work { background: var(--border); }
    .legend-dot.holiday { background: var(--orange); }
    .legend-dot.half { background: #f5a623; }
    .legend-dot.weekend { background: var(--muted); opacity: 0.4; }
    .legend-dot.worked-weekend { background: var(--green); }
    .cal-grid-wrap { overflow-y: auto; flex: 1; padding: 8px 16px 16px; }
    .cal-dow-row {
      display: grid; grid-template-columns: repeat(7, 1fr);
      margin-bottom: 4px;
    }
    .cal-dow { text-align: left; font-size: 9px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; padding: 4px 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-day {
      aspect-ratio: 1;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-family: 'DM Mono', monospace;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      position: relative;
    }
    .cal-day.empty { pointer-events: none; }
    .cal-day.weekend { color: var(--muted); opacity: 0.5; }
    .cal-day.future { color: var(--muted); opacity: 0.5; pointer-events: none; }
    .cal-day.work { background: var(--bg); border-color: var(--border); color: var(--text); }
    .cal-day.holiday { background: rgba(255,107,53,0.15); border-color: var(--orange); color: var(--orange); }
    .cal-day.half { background: rgba(245,166,35,0.15); border-color: #f5a623; color: #f5a623; }
    .cal-day.today-marker { border-color: var(--green) !important; }
    .cal-day.worked-weekend { background: rgba(0,245,160,0.1); border-color: var(--green); color: var(--green); opacity: 1; }
    .cal-day:active { transform: scale(0.9); }

    /* History button */
    .history-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--subtext);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, color 0.2s;
    }
    .history-btn:active { transform: scale(0.92); }
    .history-btn:hover { border-color: var(--green); color: var(--green); }

    /* History drawer */
    .drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      z-index: 51;
      padding: 0 0 40px;
      max-height: 80dvh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    }
    .drawer.open { transform: translateY(0); }

    .drawer-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 12px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .drawer-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .drawer-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .session-list {
      overflow-y: auto;
      flex: 1;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .session-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
    }

    .session-date {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--subtext);
      margin-bottom: 10px;
    }

    .session-times {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .time-field label {
      display: block;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .time-parts {
      display: flex;
      align-items: center;
      gap: 2px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 8px;
      transition: border-color 0.2s;
    }
    .time-parts:focus-within { border-color: var(--green); }

    .time-parts input[type="text"] {
      width: 26px;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      text-align: left;
      outline: none;
      -moz-appearance: textfield;
      padding: 0;
    }
    

    .time-sep {
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      user-select: none;
    }

    .session-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .session-duration {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--green);
    }

    .session-actions {
      display: flex;
      gap: 8px;
    }

    .btn-save, .btn-delete {
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-save { background: var(--green); color: #000; font-weight: 700; }
    .btn-delete { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-save:active, .btn-delete:active { opacity: 0.7; }

    .empty-history {
      text-align: left;
      color: var(--muted);
      font-size: 13px;
      padding: 40px 20px;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="app-name">Office Tracker</span>
    <div class="sync-indicator">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">synced</span>
    </div>
  </div>

  <div class="clock-section">
    <div class="live-time" id="liveTime">00:00:00</div>
    <div class="live-date" id="liveDate">---</div>
  </div>

  <div class="btn-wrap">
    <button class="main-btn" id="mainBtn" onclick="handleTap()">
      <div class="btn-ring"></div>
      <div class="ripple" id="ripple"></div>
      <div class="btn-inner">
        <span class="btn-label" id="btnLabel">IN</span>
        <span class="btn-sub">tap to clock</span>
      </div>
    </button>
  </div>

  <!-- Bottom section -->
  <div class="bottom-section">
    <button class="history-trigger" onclick="openDrawer()" title="Session history">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Today</div>
        <div class="stat-value green" id="todayHours">00:00:00</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Last Action</div>
        <div class="stat-value" id="lastAction">—</div>
      </div>
    </div>
    <div class="estimate-card">
      <div class="estimate-row">
        <span class="estimate-label">Monthly Estimate</span>
        <button class="estimate-edit-btn" onclick="openCalDrawer()" title="Edit working days">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </button>
      </div>
      <div class="estimate-numbers">
        <div>
          <span class="estimate-actual" id="estActual">00:00</span>
          <span class="estimate-sep">/</span>
          <span class="estimate-target" id="estTarget">00:00</span>
        </div>
        <span class="estimate-diff" id="estDiff"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="estProgress" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Calendar drawer -->
  <div class="cal-overlay" id="calOverlay" onclick="closeCalDrawer()"></div>
  <div class="cal-drawer" id="calDrawer">
    <div class="drawer-handle"></div>
    <div class="cal-header">
      <span class="cal-title" id="calTitle">Edit Working Days</span>
      <button class="cal-close" onclick="closeCalDrawer()">&#x2715;</button>
    </div>
    <div class="cal-legend">
      <div class="legend-item"><div class="legend-dot work"></div>WORKING</div>
      <div class="legend-item"><div class="legend-dot holiday"></div>HOLIDAY</div>
      <div class="legend-item"><div class="legend-dot half"></div>HALF DAY</div>
      <div class="legend-item"><div class="legend-dot weekend"></div>WEEKEND (OFF)</div>
      <div class="legend-item"><div class="legend-dot worked-weekend"></div>WORKED</div>
    </div>
    <div class="cal-grid-wrap">
      <div class="cal-dow-row">
        <div class="cal-dow">Su</div><div class="cal-dow">Mo</div>
        <div class="cal-dow">Tu</div><div class="cal-dow">We</div>
        <div class="cal-dow">Th</div><div class="cal-dow">Fr</div>
        <div class="cal-dow">Sa</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>


  <!-- History drawer -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-header">
      <span class="drawer-title">Session History</span>
      <button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>
    </div>
    <div class="session-list" id="sessionList"></div>
  </div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyWNNmVTqWm7qS41Z61l6doL1M1Sz1MGE9E5Vedb7pECWFIakgde5SFeNsG6Psl1POE/exec';

  // ── State ──────────────────────────────────────────────────
  let isClockedIn = localStorage.getItem('isClockedIn') === 'true';
  let clockInTime  = localStorage.getItem('clockInTime') ? new Date(localStorage.getItem('clockInTime')) : null;

  // sessions: [{date, inTime, outTime, durationSec}]
  let sessions = JSON.parse(localStorage.getItem('sessions') || '[]');

  // ── Clock tick ─────────────────────────────────────────────
  function pad(n){ return String(n).padStart(2,'0'); }

  function secsToHMS(s){
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
    return `${pad(h)}:${pad(m)}:${pad(sec)}`;
  }

  function tickClock(){
    const now = new Date();
    document.getElementById('liveTime').textContent =
      `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    document.getElementById('liveDate').textContent =
      now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short',year:'numeric'});
  }
  setInterval(tickClock, 1000);
  tickClock();

  // ── Stats calculation ──────────────────────────────────────
  function todayKey(){ return new Date().toLocaleDateString(); }
  function monthKey(){ const n=new Date(); return `${n.getFullYear()}-${n.getMonth()}`; }

  function calcStats(){
    const today = todayKey(), month = monthKey();
    let todaySec = 0, monthSec = 0;

    sessions.forEach(s => {
      if(s.durationSec){
        if(s.date === today) todaySec += s.durationSec;
        const d = new Date(s.inTime);
        if(`${d.getFullYear()}-${d.getMonth()}` === month) monthSec += s.durationSec;
      }
    });

    // Add live running time if clocked in
    if(isClockedIn && clockInTime){
      const live = (Date.now() - clockInTime.getTime()) / 1000;
      todaySec  += live;
      monthSec  += live;
    }

    document.getElementById('todayHours').textContent  = secsToHMS(todaySec);
    const mhEl = document.getElementById('monthHours'); if(mhEl) mhEl.textContent = secsToHMS(monthSec);
  }
  setInterval(calcStats, 1000);

  // ── UI sync ────────────────────────────────────────────────
  function updateUI(){
    const body = document.body;
    const label = document.getElementById('btnLabel');
    if(isClockedIn){
      body.classList.add('clocked-in');
      label.textContent = 'OUT';
    } else {
      body.classList.remove('clocked-in');
      label.textContent = 'IN';
    }
  }
  updateUI();
  calcStats();

  // ── Last action display ────────────────────────────────────
  function showLastAction(){
    const last = sessions[sessions.length-1];
    if(!last) return;
    const t = new Date(last.inTime||last.outTime||last.inTime);
    const action = last.outTime ? 'OUT' : 'IN';
    document.getElementById('lastAction').textContent =
      `${action} · ${pad(t.getHours())}:${pad(t.getMinutes())}`;
  }
  showLastAction();

  // ── Toast ──────────────────────────────────────────────────
  function showToast(msg, dur=2000){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=> t.classList.remove('show'), dur);
  }

  // ── Sync indicator ─────────────────────────────────────────
  function setSyncState(state){ // 'synced'|'syncing'|'error'
    const dot = document.getElementById('syncDot');
    const lbl = document.getElementById('syncLabel');
    dot.className = 'sync-dot ' + (state === 'synced' ? '' : state);
    lbl.textContent = state;
  }

  // ── Ripple ─────────────────────────────────────────────────
  function fireRipple(){
    const r = document.getElementById('ripple');
    r.classList.remove('animate');
    void r.offsetWidth; // reflow
    r.classList.add('animate');
  }

  // ── Main tap handler ───────────────────────────────────────
  function handleTap(){
    fireRipple();
    const now   = new Date();
    const action = isClockedIn ? 'OUT' : 'IN';

    // ── 1. Instant UI update (zero delay) ──
    isClockedIn = !isClockedIn;
    localStorage.setItem('isClockedIn', isClockedIn);
    updateUI();

    // ── 2. Update local sessions ──
    if(action === 'IN'){
      clockInTime = now;
      localStorage.setItem('clockInTime', now.toISOString());
      sessions.push({ date: now.toLocaleDateString(), inTime: now.toISOString(), outTime: null, durationSec: 0 });
    } else {
      const last = sessions[sessions.length-1];
      if(last && !last.outTime){
        last.outTime = now.toISOString();
        last.durationSec = Math.floor((now - new Date(last.inTime)) / 1000);
      }
      clockInTime = null;
      localStorage.removeItem('clockInTime');
    }
    localStorage.setItem('sessions', JSON.stringify(sessions));
    showLastAction();
    calcStats();

    showToast(`Clocked ${action} · ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`);

    // ── 3. Background sync to Google Sheets ──
    const payload = {
      date: now.toLocaleDateString(),
      time: `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`,
      action
    };
    setSyncState('syncing');

    if(action === 'IN'){
      // For IN: fetch so we can read the actual row number back
      fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(payload)
      })
      .then(r => r.json())
      .then(res => {
        if(res.row){
          sessions[sessions.length - 1].sheetRow = res.row;
          localStorage.setItem('sessions', JSON.stringify(sessions));
        }
        setSyncState('synced');
      })
      .catch(()=>{ setSyncState('error'); showToast('⚠ Sync failed — saved locally', 3000); });
    } else {
      // For OUT: wait until sheetRow is available, then send
      const sessionRef = sessions[sessions.length - 1];
      function sendOut(attempts){
        const sheetRow = sessionRef ? sessionRef.sheetRow : null;
        if(!sheetRow && attempts > 0){
          // sheetRow not yet back from IN response, retry in 500ms
          setTimeout(() => sendOut(attempts - 1), 500);
          return;
        }
        fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({...payload, sheetRow})
        })
        .then(()=> setSyncState('synced'))
        .catch(()=>{ setSyncState('error'); showToast('⚠ Sync failed — saved locally', 3000); });
      }
      sendOut(6); // retry up to 6x = 3 seconds wait
    }
  }

  // ── Estimate & Calendar ────────────────────────────────────────
  // dayOverrides: { "YYYY-M-D": "holiday" | "half" | "work" }
  let dayOverrides = JSON.parse(localStorage.getItem('dayOverrides') || '{}');

  function saveDayOverrides(){ localStorage.setItem('dayOverrides', JSON.stringify(dayOverrides)); }

  function getDayKey(date){ return `${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`; }

  // Count working days from start of month up to today (inclusive)
  // Returns total expected hours based on overrides
  function calcExpectedHours(){
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    let hours = 0;
    const d = new Date(year, month, 1);
    while(d.getMonth() === month && d <= now){
      const dow = d.getDay(); // 0=Sun, 6=Sat
      const key = getDayKey(d);
      const override = dayOverrides[key];
      const isWeekend = dow === 0 || dow === 6;

      if(isWeekend){
        if(override === 'worked')       hours += 8;
        else if(override === 'half')    hours += 4;
        // holiday or no override = 0 for weekends
      } else {
        if(override === 'holiday')      hours += 0;
        else if(override === 'half')    hours += 4;
        else                            hours += 8;
      }
      d.setDate(d.getDate() + 1);
    }
    return hours;
  }

  function updateEstimate(){
    // Get actual month seconds
    const month = monthKey();
    let monthSec = 0;
    sessions.forEach(s => {
      if(s.durationSec){
        const d = new Date(s.inTime);
        if(`${d.getFullYear()}-${d.getMonth()}` === month) monthSec += s.durationSec;
      }
    });
    if(isClockedIn && clockInTime){
      monthSec += (Date.now() - clockInTime.getTime()) / 1000;
    }

    const expectedHrs = calcExpectedHours();
    const expectedSec = expectedHrs * 3600;
    const actualHrs   = monthSec / 3600;
    const diffSec     = monthSec - expectedSec;

    // Format as h:mm
    function hhmm(secs){
      const abs = Math.abs(secs);
      const h = Math.floor(abs/3600);
      const m = Math.floor((abs%3600)/60);
      return `${h}:${pad(m)}`;
    }

    document.getElementById('estActual').textContent = hhmm(monthSec);
    document.getElementById('estTarget').textContent = hhmm(expectedSec);

    const diffEl = document.getElementById('estDiff');
    const progEl = document.getElementById('estProgress');

    if(expectedSec === 0){
      diffEl.textContent = '';
      progEl.style.width = '0%';
    } else {
      const pct = Math.min(100, (monthSec / expectedSec) * 100).toFixed(1);
      progEl.style.width = pct + '%';
      if(diffSec >= 0){
        diffEl.textContent = `+${hhmm(diffSec)} ahead`;
        diffEl.className = 'estimate-diff ahead';
        progEl.className = 'progress-fill';
      } else {
        diffEl.textContent = `-${hhmm(diffSec)} behind`;
        diffEl.className = 'estimate-diff behind';
        progEl.className = 'progress-fill behind';
      }
    }
  }

  setInterval(updateEstimate, 1000);
  updateEstimate();

  // ── Calendar drawer ──────────────────────────────────────────
  function openCalDrawer(){
    renderCalendar();
    document.getElementById('calDrawer').classList.add('open');
    document.getElementById('calOverlay').classList.add('open');
  }

  function closeCalDrawer(){
    document.getElementById('calDrawer').classList.remove('open');
    document.getElementById('calOverlay').classList.remove('open');
    updateEstimate();
  }

  function renderCalendar(){
    const now   = new Date();
    const year  = now.getFullYear();
    const month = now.getMonth();
    const today = now.getDate();

    // Month name
    document.getElementById('calTitle').textContent =
      now.toLocaleDateString('en-GB',{month:'long',year:'numeric'});

    const grid = document.getElementById('calGrid');
    const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    let html = '';
    // Empty cells before first day
    for(let i = 0; i < firstDay; i++){
      html += `<div class="cal-day empty"></div>`;
    }

    for(let d = 1; d <= daysInMonth; d++){
      const date  = new Date(year, month, d);
      const dow   = date.getDay();
      const key   = getDayKey(date);
      const over  = dayOverrides[key];
      const isTod = d === today;
      const isFut = d > today;

      const isWeekend = dow === 0 || dow === 6;
      let cls = 'cal-day';

      if(isFut && isWeekend)            cls += ' weekend future';
      else if(isFut)                    cls += ' future';
      else if(over === 'worked')        cls += ' worked-weekend';
      else if(over === 'holiday')       cls += ' holiday';
      else if(over === 'half')          cls += ' half';
      else if(isWeekend)                cls += ' weekend';
      else                              cls += ' work';

      if(isTod) cls += ' today-marker';

      let label;
      if(over === 'holiday')       label = '✕';
      else if(over === 'half')     label = '½';
      else if(over === 'worked')   label = '✓';
      else                         label = d;

      html += `<div class="${cls}" onclick="toggleDay('${key}',${dow},${isFut})">${label}</div>`;
    }

    grid.innerHTML = html;
  }

  function toggleDay(key, dow, isFuture){
    if(isFuture) return;
    const cur = dayOverrides[key];
    const isWeekend = dow === 0 || dow === 6;

    if(isWeekend){
      // Weekends cycle: off → worked(✓) → half(½) → off
      if(!cur){                        dayOverrides[key] = 'worked'; }
      else if(cur === 'worked'){        dayOverrides[key] = 'half'; }
      else {                            delete dayOverrides[key]; }
    } else {
      // Weekdays cycle: work → holiday(✕) → half(½) → work
      if(!cur || cur === 'work'){       dayOverrides[key] = 'holiday'; }
      else if(cur === 'holiday'){       dayOverrides[key] = 'half'; }
      else {                            delete dayOverrides[key]; }
    }
    saveDayOverrides();
    renderCalendar();
    updateEstimate();
  }

  // ── PWA service worker ─────────────────────────────────────
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }

  // ── Time input validation + auto-advance (HH→mm→ss) ──────────
  document.addEventListener('input', e => {
    const el = e.target;
    if(el.tagName !== 'INPUT' || el.type !== 'text') return;

    // Strip non-digits
    el.value = el.value.replace(/[^0-9]/g, '');

    // Clamp on 2 digits entered
    if(el.value.length >= 2){
      const id = el.id || '';
      let val = parseInt(el.value, 10);
      if(id.startsWith('in-h-') || id.startsWith('out-h-')){
        if(val > 23){ el.value = '23'; val = 23; }
      } else {
        if(val > 59){ el.value = '59'; val = 59; }
      }
      el.value = String(val).padStart(2, '0');

      // Auto-advance to next field
      const next = el.nextElementSibling && el.nextElementSibling.nextElementSibling;
      if(next && next.tagName === 'INPUT'){
        next.focus();
        next.select();
      }
    }

    // Visual error if still invalid (shouldn't happen but safety net)
    const parts = el.closest('.time-parts');
    if(parts) parts.style.borderColor = '';
  });

  // Validate on blur (handles partial input like typing just "6" and leaving)
  document.addEventListener('blur', e => {
    const el = e.target;
    if(el.tagName !== 'INPUT' || el.type !== 'text') return;
    if(el.value === '') return;

    const id = el.id || '';
    let val = parseInt(el.value, 10);
    if(isNaN(val)) { el.value = '00'; return; }

    if(id.startsWith('in-h-') || id.startsWith('out-h-')){
      val = Math.min(23, Math.max(0, val));
    } else {
      val = Math.min(59, Math.max(0, val));
    }
    el.value = String(val).padStart(2, '0');
  }, true);

  // ── History Drawer ─────────────────────────────────────────
  function openDrawer(){
    renderSessions();
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
  }

  function closeDrawer(){
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
  }

  function renderSessions(){
    const list = document.getElementById('sessionList');
    if(!sessions.length){
      list.innerHTML = '<div class="empty-history">No sessions yet.<br>Clock in to start tracking.</div>';
      return;
    }
    // Show most recent first
    list.innerHTML = [...sessions].reverse().map((s, ri) => {
      const i = sessions.length - 1 - ri; // real index
      const inT  = s.inTime  ? new Date(s.inTime)  : null;
      const outT = s.outTime ? new Date(s.outTime) : null;
      const inH  = inT  ? pad(inT.getHours())   : '';
      const inM  = inT  ? pad(inT.getMinutes()) : '';
      const inS  = inT  ? pad(inT.getSeconds()) : '';
      const outH = outT ? pad(outT.getHours())   : '';
      const outM = outT ? pad(outT.getMinutes()) : '';
      const outS = outT ? pad(outT.getSeconds()) : '';
      const dur  = s.durationSec ? secsToHMS(s.durationSec) : (s.outTime ? '—' : 'running...');

      return `
        <div class="session-item" id="sess-${i}">
          <div class="session-date">${s.date}</div>
          <div class="session-times">
            <div class="time-field">
              <label>Clock IN</label>
              <div class="time-parts">
                <input type="text" inputmode="numeric" id="in-h-${i}" value="${inH}" maxlength="2" placeholder="HH">
                <span class="time-sep">:</span>
                <input type="text" inputmode="numeric" id="in-m-${i}" value="${inM}" maxlength="2" placeholder="mm">
                <span class="time-sep">:</span>
                <input type="text" inputmode="numeric" id="in-s-${i}" value="${inS}" maxlength="2" placeholder="ss">
              </div>
            </div>
            <div class="time-field">
              <label>Clock OUT</label>
              <div class="time-parts">
                <input type="text" inputmode="numeric" id="out-h-${i}" value="${outH}" maxlength="2" placeholder="HH">
                <span class="time-sep">:</span>
                <input type="text" inputmode="numeric" id="out-m-${i}" value="${outM}" maxlength="2" placeholder="mm">
                <span class="time-sep">:</span>
                <input type="text" inputmode="numeric" id="out-s-${i}" value="${outS}" maxlength="2" placeholder="ss">
              </div>
            </div>
          </div>
          <div class="session-footer">
            <span class="session-duration" id="dur-${i}">${dur}</span>
            <div class="session-actions">
              <button class="btn-delete" onclick="deleteSession(${i})">Delete</button>
              <button class="btn-save" onclick="saveSession(${i})">Save</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function saveSession(i){
    const s = sessions[i];

    function readParts(prefix){
      const h   = document.getElementById(`${prefix}-h-${i}`).value.trim();
      const m   = document.getElementById(`${prefix}-m-${i}`).value.trim();
      const sec = document.getElementById(`${prefix}-s-${i}`).value.trim();
      if(h === '' || m === '') return null;
      return { h: Math.min(23, Math.max(0, +h||0)), m: Math.min(59, Math.max(0, +m||0)), sec: Math.min(59, Math.max(0, +sec||0)) };
    }

    const inP  = readParts('in');
    const outP = readParts('out');

    if(inP){
      const base = new Date(s.inTime || s.date);
      base.setHours(inP.h, inP.m, inP.sec, 0);
      s.inTime = base.toISOString();
    }
    if(outP){
      const base = new Date(s.outTime || s.inTime || s.date);
      base.setHours(outP.h, outP.m, outP.sec, 0);
      s.outTime = base.toISOString();
    }

    // Recalc duration
    if(s.inTime && s.outTime){
      s.durationSec = Math.max(0, Math.floor((new Date(s.outTime) - new Date(s.inTime)) / 1000));
      document.getElementById(`dur-${i}`).textContent = secsToHMS(s.durationSec);
    }

    localStorage.setItem('sessions', JSON.stringify(sessions));
    calcStats();
    showLastAction();
    showToast('✓ Session updated');

    // Sync to Sheets with full HH:mm:ss + sheetRow so edits hit the right row
    if(inP){
      const t = `${pad(inP.h)}:${pad(inP.m)}:${pad(inP.sec)}`;
      syncToSheets({ date: s.date, time: t, action: 'IN_EDIT', sheetRow: s.sheetRow });
    }
    if(outP){
      const t = `${pad(outP.h)}:${pad(outP.m)}:${pad(outP.sec)}`;
      syncToSheets({ date: s.date, time: t, action: 'OUT_EDIT', sheetRow: s.sheetRow });
    }
  }

  function deleteSession(i){
    if(!confirm('Delete this session?')) return;
    sessions.splice(i, 1);
    localStorage.setItem('sessions', JSON.stringify(sessions));
    calcStats();
    showLastAction();
    renderSessions();
    showToast('Session deleted');
  }

  function syncToSheets(payload){
    setSyncState('syncing');
    fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    })
    .then(()=> setSyncState('synced'))
    .catch(()=> setSyncState('error'));
  }
</script>
</body>
