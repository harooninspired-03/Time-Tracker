<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Office Tracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --green: #00f5a0;
      --orange: #ff6b35;
      --muted: #4a4a6a;
      --text: #e8e8f0;
      --subtext: #7a7a9a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Space Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 48px 24px 40px;
      overflow: hidden;
    }

    /* Ambient glow background */
    body::before {
      content: '';
      position: fixed;
      top: -40%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,245,160,0.06) 0%, transparent 70%);
      pointer-events: none;
      transition: background 0.6s ease;
      z-index: 0;
    }
    body.clocked-in::before {
      background: radial-gradient(circle, rgba(255,107,53,0.07) 0%, transparent 70%);
    }

    .header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 1;
    }

    .app-name {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .sync-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .sync-dot.syncing {
      background: var(--green);
      animation: pulse 1s infinite;
    }

    .sync-dot.error {
      background: var(--orange);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Clock display */
    .clock-section {
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .live-time {
      font-family: 'Syne', sans-serif;
      font-size: clamp(48px, 16vw, 72px);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }

    .live-date {
      margin-top: 8px;
      font-size: 12px;
      color: var(--subtext);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Main button */
    .btn-wrap {
      position: relative;
      z-index: 1;
    }

    .main-btn {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      position: relative;
      background: transparent;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    .btn-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--green);
      transition: border-color 0.4s ease, transform 0.15s ease;
    }

    .btn-ring::before {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 1px solid rgba(0,245,160,0.2);
      transition: border-color 0.4s ease;
    }

    .clocked-in .btn-ring {
      border-color: var(--orange);
    }
    .clocked-in .btn-ring::before {
      border-color: rgba(255,107,53,0.2);
    }

    .btn-inner {
      position: absolute;
      inset: 16px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background 0.3s, transform 0.15s;
    }

    .main-btn:active .btn-inner {
      transform: scale(0.94);
    }

    .btn-label {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: var(--green);
      transition: color 0.4s;
    }

    .clocked-in .btn-label {
      color: var(--orange);
    }

    .btn-sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Ripple on tap */
    .ripple {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
      border: 2px solid var(--green);
      opacity: 0;
      transform: scale(1);
    }
    .clocked-in .ripple { border-color: var(--orange); }
    .ripple.animate {
      animation: rippleOut 0.5s ease-out forwards;
    }
    @keyframes rippleOut {
      from { transform: scale(1); opacity: 0.6; }
      to   { transform: scale(1.4); opacity: 0; }
    }

    /* Stats bottom */
    .stats {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--subtext);
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .stat-value.green { color: var(--green); }
    .stat-value.orange { color: var(--orange); }

    .last-action {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .last-action .stat-value {
      font-size: 13px;
      color: var(--subtext);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 13px;
      color: var(--subtext);
      transition: transform 0.3s ease;
      z-index: 99;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* History button */
    .history-btn {
      position: fixed;
      bottom: 200px;
      right: 24px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--subtext);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: border-color 0.2s, color 0.2s;
    }
    .history-btn:active { transform: scale(0.92); }
    .history-btn:hover { border-color: var(--green); color: var(--green); }

    /* History drawer */
    .drawer-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }

    .drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      z-index: 51;
      padding: 0 0 40px;
      max-height: 80dvh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32,0.72,0,1);
    }
    .drawer.open { transform: translateY(0); }

    .drawer-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 12px auto 0;
      flex-shrink: 0;
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px 12px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .drawer-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }

    .drawer-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 20px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .session-list {
      overflow-y: auto;
      flex: 1;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .session-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
    }

    .session-date {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--subtext);
      margin-bottom: 10px;
    }

    .session-times {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .time-field label {
      display: block;
      font-size: 9px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .time-field input[type="time"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      padding: 8px 10px;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }
    .time-field input[type="time"]:focus {
      border-color: var(--green);
    }

    .session-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .session-duration {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--green);
    }

    .session-actions {
      display: flex;
      gap: 8px;
    }

    .btn-save, .btn-delete {
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-save { background: var(--green); color: #000; font-weight: 700; }
    .btn-delete { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-save:active, .btn-delete:active { opacity: 0.7; }

    .empty-history {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 40px 20px;
      line-height: 1.8;
    }
  </style>
</head>
<body>

  <div class="header">
    <span class="app-name">Office Tracker</span>
    <div class="sync-indicator">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">synced</span>
    </div>
  </div>

  <div class="clock-section">
    <div class="live-time" id="liveTime">00:00:00</div>
    <div class="live-date" id="liveDate">---</div>
  </div>

  <div class="btn-wrap">
    <button class="main-btn" id="mainBtn" onclick="handleTap()">
      <div class="btn-ring"></div>
      <div class="ripple" id="ripple"></div>
      <div class="btn-inner">
        <span class="btn-label" id="btnLabel">IN</span>
        <span class="btn-sub">tap to clock</span>
      </div>
    </button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Today</div>
      <div class="stat-value green" id="todayHours">00:00:00</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This Month</div>
      <div class="stat-value" id="monthHours">00:00:00</div>
    </div>
    <div class="stat-card last-action">
      <div class="stat-label">Last Action</div>
      <div class="stat-value" id="lastAction">—</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- History button -->
  <button class="history-btn" onclick="openDrawer()" title="Edit history">&#9776;</button>

  <!-- History drawer -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-handle"></div>
    <div class="drawer-header">
      <span class="drawer-title">Session History</span>
      <button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>
    </div>
    <div class="session-list" id="sessionList"></div>
  </div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwZ0MbIwV9F4AcMtJgdNAXD9jpSHOkWftL7V25ABSKkY8PBeLaImJySvK5v1CjiESYz/exec';

  // ── State ──────────────────────────────────────────────────
  let isClockedIn = localStorage.getItem('isClockedIn') === 'true';
  let clockInTime  = localStorage.getItem('clockInTime') ? new Date(localStorage.getItem('clockInTime')) : null;

  // sessions: [{date, inTime, outTime, durationSec}]
  let sessions = JSON.parse(localStorage.getItem('sessions') || '[]');

  // ── Clock tick ─────────────────────────────────────────────
  function pad(n){ return String(n).padStart(2,'0'); }

  function secsToHMS(s){
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
    return `${pad(h)}:${pad(m)}:${pad(sec)}`;
  }

  function tickClock(){
    const now = new Date();
    document.getElementById('liveTime').textContent =
      `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    document.getElementById('liveDate').textContent =
      now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short',year:'numeric'});
  }
  setInterval(tickClock, 1000);
  tickClock();

  // ── Stats calculation ──────────────────────────────────────
  function todayKey(){ return new Date().toLocaleDateString(); }
  function monthKey(){ const n=new Date(); return `${n.getFullYear()}-${n.getMonth()}`; }

  function calcStats(){
    const today = todayKey(), month = monthKey();
    let todaySec = 0, monthSec = 0;

    sessions.forEach(s => {
      if(s.durationSec){
        if(s.date === today) todaySec += s.durationSec;
        const d = new Date(s.inTime);
        if(`${d.getFullYear()}-${d.getMonth()}` === month) monthSec += s.durationSec;
      }
    });

    // Add live running time if clocked in
    if(isClockedIn && clockInTime){
      const live = (Date.now() - clockInTime.getTime()) / 1000;
      todaySec  += live;
      monthSec  += live;
    }

    document.getElementById('todayHours').textContent  = secsToHMS(todaySec);
    document.getElementById('monthHours').textContent  = secsToHMS(monthSec);
  }
  setInterval(calcStats, 1000);

  // ── UI sync ────────────────────────────────────────────────
  function updateUI(){
    const body = document.body;
    const label = document.getElementById('btnLabel');
    if(isClockedIn){
      body.classList.add('clocked-in');
      label.textContent = 'OUT';
    } else {
      body.classList.remove('clocked-in');
      label.textContent = 'IN';
    }
  }
  updateUI();
  calcStats();

  // ── Last action display ────────────────────────────────────
  function showLastAction(){
    const last = sessions[sessions.length-1];
    if(!last) return;
    const t = new Date(last.inTime||last.outTime||last.inTime);
    const action = last.outTime ? 'OUT' : 'IN';
    document.getElementById('lastAction').textContent =
      `${action} · ${pad(t.getHours())}:${pad(t.getMinutes())}`;
  }
  showLastAction();

  // ── Toast ──────────────────────────────────────────────────
  function showToast(msg, dur=2000){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(()=> t.classList.remove('show'), dur);
  }

  // ── Sync indicator ─────────────────────────────────────────
  function setSyncState(state){ // 'synced'|'syncing'|'error'
    const dot = document.getElementById('syncDot');
    const lbl = document.getElementById('syncLabel');
    dot.className = 'sync-dot ' + (state === 'synced' ? '' : state);
    lbl.textContent = state;
  }

  // ── Ripple ─────────────────────────────────────────────────
  function fireRipple(){
    const r = document.getElementById('ripple');
    r.classList.remove('animate');
    void r.offsetWidth; // reflow
    r.classList.add('animate');
  }

  // ── Main tap handler ───────────────────────────────────────
  function handleTap(){
    fireRipple();
    const now   = new Date();
    const action = isClockedIn ? 'OUT' : 'IN';

    // ── 1. Instant UI update (zero delay) ──
    isClockedIn = !isClockedIn;
    localStorage.setItem('isClockedIn', isClockedIn);
    updateUI();

    // ── 2. Update local sessions ──
    if(action === 'IN'){
      clockInTime = now;
      localStorage.setItem('clockInTime', now.toISOString());
      sessions.push({ date: now.toLocaleDateString(), inTime: now.toISOString(), outTime: null, durationSec: 0 });
    } else {
      const last = sessions[sessions.length-1];
      if(last && !last.outTime){
        last.outTime = now.toISOString();
        last.durationSec = Math.floor((now - new Date(last.inTime)) / 1000);
      }
      clockInTime = null;
      localStorage.removeItem('clockInTime');
    }
    localStorage.setItem('sessions', JSON.stringify(sessions));
    showLastAction();
    calcStats();

    showToast(`Clocked ${action} · ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`);

    // ── 3. Background sync to Google Sheets ──
    const payload = {
      date: now.toLocaleDateString(),
      time: `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`,
      action
    };
    setSyncState('syncing');
    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(payload)
    })
    .then(()=> setSyncState('synced'))
    .catch(()=>{
      setSyncState('error');
      showToast('⚠ Sync failed — saved locally', 3000);
    });
  }

  // ── PWA service worker ─────────────────────────────────────
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }

  // ── History Drawer ─────────────────────────────────────────
  function openDrawer(){
    renderSessions();
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('open');
  }

  function closeDrawer(){
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
  }

  function renderSessions(){
    const list = document.getElementById('sessionList');
    if(!sessions.length){
      list.innerHTML = '<div class="empty-history">No sessions yet.<br>Clock in to start tracking.</div>';
      return;
    }
    // Show most recent first
    list.innerHTML = [...sessions].reverse().map((s, ri) => {
      const i = sessions.length - 1 - ri; // real index
      const inT  = s.inTime  ? new Date(s.inTime)  : null;
      const outT = s.outTime ? new Date(s.outTime) : null;
      const inVal  = inT  ? `${pad(inT.getHours())}:${pad(inT.getMinutes())}:${pad(inT.getSeconds())}` : '';
      const outVal = outT ? `${pad(outT.getHours())}:${pad(outT.getMinutes())}:${pad(outT.getSeconds())}` : '';
      const dur = s.durationSec ? secsToHMS(s.durationSec) : (s.outTime ? '—' : 'running...');

      return `
        <div class="session-item" id="sess-${i}">
          <div class="session-date">${s.date}</div>
          <div class="session-times">
            <div class="time-field">
              <label>Clock IN</label>
              <input type="time" id="in-${i}" value="${inVal}" step="1" />
            </div>
            <div class="time-field">
              <label>Clock OUT</label>
              <input type="time" id="out-${i}" value="${outVal}" step="1" />
            </div>
          </div>
          <div class="session-footer">
            <span class="session-duration" id="dur-${i}">${dur}</span>
            <div class="session-actions">
              <button class="btn-delete" onclick="deleteSession(${i})">Delete</button>
              <button class="btn-save" onclick="saveSession(${i})">Save</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function saveSession(i){
    const inInput  = document.getElementById(`in-${i}`).value;  // "HH:mm" or "HH:mm:ss"
    const outInput = document.getElementById(`out-${i}`).value;
    const s = sessions[i];

    function parseTimeParts(val){
      const parts = val.split(':');
      return { h: +parts[0], m: +parts[1], sec: parts[2] ? +parts[2] : 0 };
    }

    function toTimeString(val){
      const {h,m,sec} = parseTimeParts(val);
      return `${pad(h)}:${pad(m)}:${pad(sec)}`;
    }

    if(inInput){
      const {h,m,sec} = parseTimeParts(inInput);
      const base = new Date(s.inTime || s.date);
      base.setHours(h, m, sec, 0);
      s.inTime = base.toISOString();
    }
    if(outInput){
      const {h,m,sec} = parseTimeParts(outInput);
      const base = new Date(s.outTime || s.inTime || s.date);
      base.setHours(h, m, sec, 0);
      s.outTime = base.toISOString();
    }

    // Recalc duration
    if(s.inTime && s.outTime){
      s.durationSec = Math.max(0, Math.floor((new Date(s.outTime) - new Date(s.inTime)) / 1000));
      document.getElementById(`dur-${i}`).textContent = secsToHMS(s.durationSec);
    }

    localStorage.setItem('sessions', JSON.stringify(sessions));
    calcStats();
    showLastAction();
    showToast('✓ Session updated');

    // Sync edit to Sheets — always send proper HH:mm:ss
    if(inInput){
      syncToSheets({ date: s.date, time: toTimeString(inInput), action: 'IN_EDIT', sessionIndex: i });
    }
    if(outInput){
      syncToSheets({ date: s.date, time: toTimeString(outInput), action: 'OUT_EDIT', sessionIndex: i });
    }
  }

  function deleteSession(i){
    if(!confirm('Delete this session?')) return;
    sessions.splice(i, 1);
    localStorage.setItem('sessions', JSON.stringify(sessions));
    calcStats();
    showLastAction();
    renderSessions();
    showToast('Session deleted');
  }

  function syncToSheets(payload){
    setSyncState('syncing');
    fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(payload)
    })
    .then(()=> setSyncState('synced'))
    .catch(()=> setSyncState('error'));
  }
</script>
</body>
